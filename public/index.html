<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixed Up</title>
  <link rel="stylesheet" href="/styles/theme.css">
  <style>
    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px var(--gutter);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .mode-toggle { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .mode-btn {
      padding: 6px 14px;
      border-radius: 999px;
      font-weight: 500;
      font-size: 0.8125rem;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: var(--bg);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
      line-height: 1.4;
    }

    .mode-btn:hover {
      color: var(--text);
      border-color: var(--border-strong);
    }

    .mode-btn.active {
      background: var(--accent-muted);
      border-color: transparent;
      color: var(--accent);
    }

    /* City source: kept in markup for later; delete this rule to show again */
    #btn-source-city { display: none; }

    /* ── Main grid — mobile-first, single column ────────────────────────── */
    .main {
      display: grid;
      width: 100%;
      padding: var(--gutter);
      gap: 10px;
      grid-template-columns: minmax(0, var(--board-max));
      grid-template-areas:
        "board"
        "preview"
        "stats"
        "pb"
        "badges"
        "loading";
      justify-content: center;
      flex: 1;
    }

    /* ── Desktop two-column layout ──────────────────────────────────────── */
    @media (min-width: 768px) {
      .main {
        grid-template-columns: minmax(0, var(--board-max)) minmax(0, 260px);
        grid-template-rows: auto auto auto auto 1fr auto;
        grid-template-areas:
          "board preview"
          "board stats"
          "board pb"
          "board badges"
          "board ."
          "board loading";
        column-gap: 24px;
        row-gap: 14px;
        padding: 24px;
        max-width: 820px;
        margin: 0 auto;
        align-items: start;
      }
    }

    /* ── Puzzle board (hero) ─────────────────────────────────────────────── */
    .board-section { grid-area: board; }

    .board-wrapper { position: relative; width: 100%; }

    #board {
      display: grid;
      gap: 4px;
      background: var(--board-bg);
      border-radius: var(--radius);
      padding: 4px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      width: 100%;
    }

    .tile {
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }

    .tile:hover:not(.empty) { transform: scale(1.02); z-index: 1; }
    .tile:active:not(.empty) { transform: scale(0.99); }

    .tile.empty {
      background: var(--empty-tile) !important;
      cursor: default;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.06);
    }

    .tile.moving { transition: transform 0.15s ease; }

    /* ── Preview thumbnail (standalone reference strip) ─────────────────── */
    .preview-section {
      grid-area: preview;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .preview-section.loaded { display: flex; }

    .preview-label {
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .preview-thumb {
      height: 80px;
      width: auto;
      max-width: 100%;
      border-radius: var(--radius-sm);
      object-fit: cover;
      cursor: pointer;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      transition: opacity 0.2s, box-shadow 0.2s;
    }

    .preview-thumb:hover {
      opacity: 0.92;
      box-shadow: var(--shadow);
    }

    @media (min-width: 768px) {
      .preview-section { align-items: stretch; }
      .preview-thumb {
        height: auto;
        width: 100%;
        max-height: 160px;
        border-radius: var(--radius);
        object-fit: cover;
      }
    }

    /* ── Preview full-size modal ────────────────────────────────────────── */
    .preview-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .preview-modal.show { display: flex; }

    .preview-modal-inner { position: relative; max-width: 100%; }

    .preview-modal img {
      max-width: min(90vw, 600px);
      max-height: 80vh;
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
      display: block;
    }

    .preview-modal-close {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
      box-shadow: var(--shadow-soft);
      transition: color 0.15s, background 0.15s;
    }

    .preview-modal-close:hover {
      color: var(--text);
      background: var(--bg);
    }

    /* ── Win overlay (over completed board) ─────────────────────────────── */
    #win-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: var(--radius);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
      padding: 20px;
      z-index: 10;
    }

    #win-overlay.show { display: flex; }

    .win-title  { font-size: 1.375rem; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }

    .win-stats  { font-size: 0.875rem; color: var(--text-muted); }

    .win-record { color: var(--accent); font-weight: 500; font-size: 0.8125rem; }

    /* ── Live stats row ──────────────────────────────────────────────────── */
    .stats-row {
      grid-area: stats;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      flex-wrap: wrap;
    }

    .stat-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 52px;
    }

    .stat-label {
      font-size: 0.625rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .stat-value {
      font-size: 1.375rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .stats-divider {
      width: 1px;
      height: 30px;
      background: var(--border);
      flex-shrink: 0;
    }

    .stats-spacer { flex: 1; }

    /* Keep stats row clean on small widths */
    @media (max-width: 420px) {
      .stats-row {
        gap: 8px;
      }

      .stats-spacer {
        flex-basis: 100%;
        height: 0;
      }

      .stats-row .btn {
        width: 100%;
        justify-content: center;
      }
    }

    /* ── Shared button ───────────────────────────────────────────────────── */
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn:hover  { background: var(--accent-press); }
    .btn:active { transform: scale(0.98); }

    /* ── Personal bests row (two cards) ──────────────────────────────────── */
    .pb-row {
      grid-area: pb;
      display: grid;
      /* Prevent min-content overflow from stretching the grid wider */
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
    }

    @media (max-width: 360px) {
      .pb-row { grid-template-columns: 1fr; }
    }

    .pb-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 0;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    .pb-card--time  { border-left: 3px solid var(--accent); }
    .pb-card--moves { border-left: 3px solid var(--highlight); }

    .pb-info  { display: flex; flex-direction: column; min-width: 0; gap: 4px; }

    .pb-label {
      font-size: 0.625rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .pb-value {
      font-size: 1.125rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      white-space: nowrap;
      letter-spacing: -0.02em;
    }

    /* ── Badge shelf (horizontal scroll) ─────────────────────────────────── */
    .badge-section {
      grid-area: badges;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    .badge-shelf-title {
      font-size: 0.625rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .badge-tray {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .badge-tray::-webkit-scrollbar { display: none; }

    .badge-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      border: 1px solid var(--border);
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s, border-color 0.2s, background 0.2s;
      flex-shrink: 0;
      min-width: 64px;
      user-select: none;
    }

    .badge-item.earned {
      opacity: 1;
      background: var(--accent-muted);
      border-color: transparent;
    }

    .badge-mark {
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .badge-item.earned .badge-mark {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .badge-label {
      font-size: 0.625rem;
      color: var(--text-muted);
      font-weight: 500;
      text-align: center;
      line-height: 1.25;
      max-width: 76px;
    }

    .badge-item.earned .badge-label { color: var(--text); }

    /* Tap-activated badge tooltip popup */
    #badge-popup {
      display: none;
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 0.8125rem;
      color: var(--text);
      z-index: 300;
      max-width: 220px;
      box-shadow: var(--shadow);
      pointer-events: none;
    }

    #badge-popup.show { display: block; }

    #badge-popup strong {
      display: block;
      color: var(--text);
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.875rem;
    }

    .badge-popup-desc {
      color: var(--text-muted);
      font-size: 0.8125rem;
      line-height: 1.4;
    }

    /* ── Loading message ─────────────────────────────────────────────────── */
    #loading-msg {
      grid-area: loading;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      min-height: 1.2em;
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 16px var(--gutter);
      font-size: 0.75rem;
      color: var(--text-muted);
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
  </style>
</head>
<body>

  <!-- ① Header bar: title left, mode toggle right -->
  <header class="header">
    <h1>Mixed Up</h1>
    <nav class="mode-toggle" aria-label="Puzzle settings">
      <a href="?source=city&mode=easy" class="mode-btn" id="btn-source-city" aria-hidden="true" tabindex="-1">City</a>
      <a href="?source=music&mode=easy" class="mode-btn" id="btn-source-music">Music</a>
      <span style="width:10px; display:inline-block;"></span>
      <a href="?mode=easy" class="mode-btn" id="btn-easy">Easy</a>
      <a href="?mode=hard" class="mode-btn" id="btn-hard">Hard</a>
    </nav>
  </header>

  <main class="main">

    <!-- ② Hero: puzzle board -->
    <div class="board-section">
      <div class="board-wrapper">
        <div id="board"></div>
        <!-- Win modal over the board -->
        <div id="win-overlay">
          <div class="win-title">Puzzle Solved!</div>
          <div class="win-stats" id="win-stats"></div>
          <div id="win-records"></div>
          <button class="btn" onclick="newGame()" style="margin-top:8px">Play Again</button>
        </div>
      </div>
    </div>

    <!-- ② b Reference thumbnail — tap to expand -->
    <div id="preview" class="preview-section">
      <span class="preview-label">Reference</span>
      <img id="preview-thumb" class="preview-thumb" alt="Reference image" />
    </div>

    <!-- ③ Live stats row: Moves | Time | — | New Game -->
    <div class="stats-row">
      <div class="stat-chip">
        <span class="stat-label">Moves</span>
        <span class="stat-value" id="move-count">0</span>
      </div>
      <div class="stats-divider"></div>
      <div class="stat-chip">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="timer">0:00</span>
      </div>
      <div class="stats-spacer"></div>
      <button class="btn" id="new-game-btn">New Game</button>
    </div>

    <!-- ④ Personal bests: two side-by-side cards -->
    <div class="pb-row">
      <div class="pb-card pb-card--time">
        <div class="pb-info">
          <span class="pb-label">Best time</span>
          <span class="pb-value" id="pb-time-display">--</span>
        </div>
      </div>
      <div class="pb-card pb-card--moves">
        <div class="pb-info">
          <span class="pb-label">Best moves</span>
          <span class="pb-value" id="pb-moves-display">--</span>
        </div>
      </div>
    </div>

    <!-- ⑤ Badge shelf (horizontally scrollable) -->
    <div class="badge-section">
      <div class="badge-shelf-title">Badges</div>
      <div class="badge-tray" id="badge-tray"></div>
    </div>

    <p id="loading-msg">Loading image...</p>

    <!-- Phase C (optional in-game ads): non-intrusive slot only; never overlay #board. Wire after consent + policy. See plan.md. -->
    <div id="ad-slot-game" class="ad-slot-game" hidden aria-hidden="true"></div>
  </main>

  <!-- Preview full-size modal (toggled by thumbnail tap) -->
  <div class="preview-modal" id="preview-modal">
    <div class="preview-modal-inner">
      <img id="preview-modal-img" src="" alt="Full reference image" />
      <div class="preview-modal-close" id="preview-modal-close">×</div>
    </div>
  </div>

  <!-- Badge tooltip popup (tap-activated) -->
  <div id="badge-popup"></div>

  <!-- ⑥ Footer -->
  <footer>Mixed Up Daily  · <span id="footer-date"></span></footer>

  <script>
    const params = new URLSearchParams(location.search);
    const MODE  = params.get('mode') === 'hard' ? 'hard' : 'easy';
    const SOURCE = params.get('source') === 'city' ? 'city' : 'music';
    const GRID  = MODE === 'hard' ? 4 : 3;
    const TOTAL = GRID * GRID;

    // Activate mode button
    document.getElementById('btn-' + MODE).classList.add('active');
    document.getElementById('btn-source-' + SOURCE).classList.add('active');

    // Keep toggles consistent across clicks (preserve both params)
    function setToggleHref(el, next) {
      const q = new URLSearchParams(location.search);
      Object.entries(next).forEach(([k, v]) => q.set(k, v));
      el.href = `?${q.toString()}`;
    }

    setToggleHref(document.getElementById('btn-source-city'),  { source: 'city' });
    setToggleHref(document.getElementById('btn-source-music'), { source: 'music' });
    setToggleHref(document.getElementById('btn-easy'), { mode: 'easy' });
    setToggleHref(document.getElementById('btn-hard'), { mode: 'hard' });

    // Footer date
    document.getElementById('footer-date').textContent =
      new Date().toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
      });

    const boardEl = document.getElementById('board');

    // ── Cookie helpers ────────────────────────────────────────────────────
    function setCookie(name, value, days) {
      const expires = new Date(Date.now() + days * 864e5).toUTCString();
      document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
    }

    function getCookie(name) {
      const match = document.cookie.split('; ').find(row => row.startsWith(name + '='));
      return match ? decodeURIComponent(match.split('=')[1]) : null;
    }

    // ── Badges ────────────────────────────────────────────────────────────
    const BADGES = [
      { id: 'speed_demon',  abbr: 'SD', label: 'Speed Demon',  desc: 'Finish in under 60 seconds.', earned: false },
      { id: 'efficient',    abbr: 'EF', label: 'Efficient',     desc: 'Finish in under 30 moves.', earned: false },
      { id: 'first_solve',  abbr: '1×', label: 'First solve',   desc: 'Complete a puzzle once.', earned: false },
      { id: 'daily_player', abbr: '7d', label: 'Daily player',  desc: 'Play on 7 consecutive days.', earned: false },
    ];

    function loadEarnedBadges() {
      const raw = getCookie('earned_badges');
      if (!raw) return;
      const ids = raw.split(',').map(s => s.trim()).filter(Boolean);
      BADGES.forEach(b => { if (ids.includes(b.id)) b.earned = true; });
    }

    function saveEarnedBadges() {
      const ids = BADGES.filter(b => b.earned).map(b => b.id).join(',');
      setCookie('earned_badges', ids, 365);
    }

    const badgePopup = document.getElementById('badge-popup');
    let badgePopupTimer = null;

    function showBadgePopup(badge, anchorEl) {
      clearTimeout(badgePopupTimer);
      badgePopup.innerHTML =
        `<strong>${badge.label}</strong><span class="badge-popup-desc">${badge.desc}</span>`;
      badgePopup.classList.add('show');

      // Measure after making visible
      const rect    = anchorEl.getBoundingClientRect();
      const popH    = badgePopup.offsetHeight;
      const popW    = 220;
      let left = rect.left + rect.width / 2 - popW / 2;
      let top  = rect.top - popH - 8;

      // Clamp horizontally
      left = Math.max(8, Math.min(left, window.innerWidth - popW - 8));
      // Flip below if off top edge
      if (top < 8) top = rect.bottom + 8;

      badgePopup.style.left = left + 'px';
      badgePopup.style.top  = top  + 'px';

      badgePopupTimer = setTimeout(() => badgePopup.classList.remove('show'), 3000);
    }

    function renderBadges() {
      const tray = document.getElementById('badge-tray');
      tray.innerHTML = '';
      BADGES.forEach(badge => {
        const el = document.createElement('div');
        el.className = 'badge-item' + (badge.earned ? ' earned' : '');
        el.innerHTML =
          `<span class="badge-mark">${badge.abbr}</span>` +
          `<span class="badge-label">${badge.label}</span>`;
        el.addEventListener('click', () => showBadgePopup(badge, el));
        tray.appendChild(el);
      });
    }

    function awardBadge(id) {
      const badge = BADGES.find(b => b.id === id);
      if (badge && !badge.earned) {
        badge.earned = true;
        saveEarnedBadges();
        renderBadges();
        return true;
      }
      return false;
    }

    // Dismiss badge popup on outside tap
    document.addEventListener('click', e => {
      if (!e.target.closest('.badge-item')) badgePopup.classList.remove('show');
    });

    // ── Personal Bests ────────────────────────────────────────────────────
    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = String(secs % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function loadPBDisplay() {
      const pbTime  = getCookie('pb_time');
      const pbMoves = getCookie('pb_moves');
      document.getElementById('pb-time-display').textContent  = pbTime  ? formatTime(parseInt(pbTime, 10)) : '--';
      document.getElementById('pb-moves-display').textContent = pbMoves ? pbMoves : '--';
    }

    // Returns array of record strings e.g. ['New best time']
    function checkAndSavePBs(elapsedSecs, moveCount) {
      const records = [];
      const pbTime  = getCookie('pb_time');
      const pbMoves = getCookie('pb_moves');

      if (pbTime === null || elapsedSecs < parseInt(pbTime, 10)) {
        setCookie('pb_time', elapsedSecs, 365);
        document.getElementById('pb-time-display').textContent = formatTime(elapsedSecs);
        if (pbTime !== null) records.push('New best time');
      }

      if (pbMoves === null || moveCount < parseInt(pbMoves, 10)) {
        setCookie('pb_moves', moveCount, 365);
        document.getElementById('pb-moves-display').textContent = moveCount;
        if (pbMoves !== null) records.push('New best moves');
      }

      return records;
    }

    // ── Puzzle state ──────────────────────────────────────────────────────
    let tiles        = [];
    let emptyIdx     = 0;
    let moves        = 0;
    let startTime    = null;
    let timerInterval = null;
    let solved       = false;
    let imageLoaded  = false;
    let IMAGE_URL    = '';

    // ── Solvability ───────────────────────────────────────────────────────
    function countInversions(arr) {
      let inv = 0;
      for (let i = 0; i < arr.length - 1; i++)
        for (let j = i + 1; j < arr.length; j++)
          if (arr[i] && arr[j] && arr[i] > arr[j]) inv++;
      return inv;
    }

    function isSolvable(arr) {
      const inv              = countInversions(arr);
      const emptyRow         = Math.floor(arr.indexOf(0) / GRID);
      const emptyRowFromBottom = GRID - emptyRow;
      return (inv % 2 === 0) === (emptyRowFromBottom % 2 === 1);
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function generateSolvable() {
      const arr = Array.from({ length: TOTAL }, (_, i) => i);
      do { shuffle(arr); } while (!isSolvable(arr) || isSolved(arr));
      return arr;
    }

    function isSolved(arr) {
      return arr.every((v, i) => v === i);
    }

    // ── Rendering (responsive tile sizing) ───────────────────────────────
    function render() {
      // Compute pixel tile size from the board's current rendered width.
      // Board padding: 3px each side = 6px; gaps: 3px × (GRID-1).
      const boardWidth = boardEl.offsetWidth ||
        Math.floor(Math.min(window.innerWidth, 480) - 2 * 12);
      const tileSize = Math.floor((boardWidth - 6 - 3 * (GRID - 1)) / GRID);

      boardEl.innerHTML = '';
      boardEl.style.gridTemplateColumns = `repeat(${GRID}, 1fr)`;

      tiles.forEach((val, idx) => {
        const tile = document.createElement('div');
        // Solved: show every image slice (incl. piece 0); in play, 0 stays the empty slot.
        const piece   = solved ? idx : val;
        const isEmpty = !solved && val === 0;
        tile.className = 'tile' + (isEmpty ? ' empty' : '');
        tile.dataset.idx = idx;

        if (!isEmpty && imageLoaded) {
          const col = piece % GRID;
          const row = Math.floor(piece / GRID);
          tile.style.backgroundImage    = `url('${IMAGE_URL}')`;
          tile.style.backgroundSize     = `${GRID * tileSize}px ${GRID * tileSize}px`;
          tile.style.backgroundPosition = `-${col * tileSize}px -${row * tileSize}px`;
        } else if (!isEmpty) {
          // Muted fallback palette (less “rainbow”, still distinct)
          tile.style.background = `hsl(${(200 + piece * 18) % 360}, var(--tile-sat), var(--tile-lit))`;
        }

        tile.addEventListener('click', () => handleClick(idx));
        boardEl.appendChild(tile);
      });
    }

    // Re-render when board dimensions change (resize / orientation change)
    if (window.ResizeObserver) {
      new ResizeObserver(() => { if (tiles.length) render(); }).observe(boardEl);
    }

    // ── Move logic ────────────────────────────────────────────────────────
    function getMovable() {
      const row = Math.floor(emptyIdx / GRID);
      const col = emptyIdx % GRID;
      const neighbors = [];
      if (row > 0)          neighbors.push(emptyIdx - GRID);
      if (row < GRID - 1)   neighbors.push(emptyIdx + GRID);
      if (col > 0)          neighbors.push(emptyIdx - 1);
      if (col < GRID - 1)   neighbors.push(emptyIdx + 1);
      return neighbors;
    }

    function handleClick(idx) {
      if (solved) return;
      const movable = getMovable();
      if (!movable.includes(idx)) return;

      [tiles[emptyIdx], tiles[idx]] = [tiles[idx], tiles[emptyIdx]];
      emptyIdx = idx;
      moves++;
      document.getElementById('move-count').textContent = moves;

      if (startTime === null) startTimer();

      const nowSolved = isSolved(tiles);
      if (nowSolved) solved = true;
      render();

      if (nowSolved) winGame();
    }

    // ── Timer ─────────────────────────────────────────────────────────────
    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(updateTimer, 500);
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(elapsed / 60);
      const s = String(elapsed % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function elapsedSecs() {
      if (!startTime) return 0;
      return Math.floor((Date.now() - startTime) / 1000);
    }

    function elapsedStr() { return formatTime(elapsedSecs()); }

    // ── Win ───────────────────────────────────────────────────────────────
    function winGame() {
      solved = true;
      stopTimer();

      const secs    = elapsedSecs();
      const records = checkAndSavePBs(secs, moves);

      const newBadges = [];
      if (awardBadge('first_solve'))               newBadges.push('First solve');
      if (secs  < 60  && awardBadge('speed_demon')) newBadges.push('Speed Demon');
      if (moves < 30  && awardBadge('efficient'))   newBadges.push('Efficient');

      document.getElementById('win-stats').textContent = `${moves} moves · ${elapsedStr()}`;

      const allHighlights = [...records, ...newBadges];
      document.getElementById('win-records').innerHTML = allHighlights
        .map(msg => `<div class="win-record">${msg}</div>`)
        .join('');

      document.getElementById('win-overlay').classList.add('show');
    }

    // ── New game ──────────────────────────────────────────────────────────
    function newGame() {
      stopTimer();
      tiles    = generateSolvable();
      emptyIdx = tiles.indexOf(0);
      moves    = 0;
      startTime = null;
      solved   = false;
      document.getElementById('move-count').textContent = '0';
      document.getElementById('timer').textContent      = '0:00';
      document.getElementById('win-overlay').classList.remove('show');
      document.getElementById('win-records').innerHTML = '';
      render();
    }

    // ── Preview thumbnail & modal ─────────────────────────────────────────
    const previewThumb    = document.getElementById('preview-thumb');
    const previewModal    = document.getElementById('preview-modal');
    const previewModalImg = document.getElementById('preview-modal-img');

    previewThumb.addEventListener('click', () => previewModal.classList.add('show'));

    document.getElementById('preview-modal-close').addEventListener('click', () =>
      previewModal.classList.remove('show'));

    previewModal.addEventListener('click', e => {
      if (e.target === previewModal) previewModal.classList.remove('show');
    });

    // ── Image loading ─────────────────────────────────────────────────────
    function loadImage(url) {
      IMAGE_URL = url;
      previewThumb.src    = IMAGE_URL;
      previewModalImg.src = IMAGE_URL;
      const img = new Image();
      img.onload = () => {
        imageLoaded = true;
        document.getElementById('preview').classList.add('loaded');
        document.getElementById('loading-msg').textContent = '';
        render();
      };
      img.onerror = () => {
        document.getElementById('loading-msg').textContent =
          'Image failed to load — tiles shown as colors.';
        imageLoaded = false;
        render();
      };
      img.src = IMAGE_URL;
    }

    // ── Boot ──────────────────────────────────────────────────────────────
    document.getElementById('new-game-btn').addEventListener('click', newGame);

    loadEarnedBadges();
    renderBadges();
    loadPBDisplay();
    newGame();

    fetch(`/api/config?source=${encodeURIComponent(SOURCE)}`)
      .then(r => r.json())
      .then(cfg => {
        loadImage(cfg.imageUrl);
        if (cfg && cfg.meta && cfg.meta.source === 'music' && cfg.meta.year) {
          const label = document.querySelector('.preview-label');
          if (label) label.textContent = `Music · ${cfg.meta.year} · Reference`;
        }
      })
      .catch(() => {
        document.getElementById('loading-msg').textContent =
          'Could not load config — tiles shown as colors.';
      });
  </script>
</body>
</html>
