<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Puzzle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
    }

    .game-area {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 160px;
    }

    .stats {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e94560;
    }

    .preview-box {
      background: #16213e;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .preview-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }

    .preview-img {
      width: 140px;
      height: 140px;
      border-radius: 8px;
      object-fit: cover;
      display: block;
    }

    .btn {
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    /* Puzzle board */
    .board-wrapper {
      position: relative;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-template-rows: repeat(4, 100px);
      gap: 3px;
      background: #0f3460;
      border-radius: 12px;
      padding: 3px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .tile {
      width: 100px;
      height: 100px;
      border-radius: 6px;
      background-size: 400px 400px;
      cursor: pointer;
      transition: transform 0.12s ease;
      position: relative;
      overflow: hidden;
    }

    .tile:hover:not(.empty) {
      transform: scale(1.03);
      z-index: 1;
    }

    .tile.empty {
      background: #0a1628 !important;
      cursor: default;
      box-shadow: inset 0 0 12px rgba(0,0,0,0.8);
    }

    .tile.moving {
      transition: transform 0.15s ease;
    }

    /* Win overlay */
    #win-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(10, 22, 40, 0.92);
      border-radius: 12px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 20px;
    }

    #win-overlay.show { display: flex; }

    .win-emoji { font-size: 3rem; }

    .win-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e94560;
    }

    .win-stats {
      font-size: 0.9rem;
      color: #aaa;
    }

    .loading-msg {
      color: #888;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 4px;
    }

    /* Personal Bests panel */
    .pb-panel {
      background: #16213e;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pb-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 2px;
    }

    .pb-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .pb-icon { font-size: 1rem; }

    .pb-label { color: #aaa; flex: 1; }

    .pb-value {
      font-weight: 700;
      color: #e94560;
      font-size: 1rem;
    }

    /* Badge shelf */
    .badge-shelf {
      background: #16213e;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .badge-shelf-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }

    .badge-tray {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge-item {
      position: relative;
      font-size: 1.5rem;
      cursor: default;
      filter: grayscale(1) opacity(0.3);
      transition: filter 0.3s;
    }

    .badge-item.earned {
      filter: none;
    }

    .badge-item .badge-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #0f3460;
      border: 1px solid #e94560;
      border-radius: 8px;
      padding: 6px 10px;
      white-space: nowrap;
      font-size: 0.75rem;
      color: #eee;
      z-index: 10;
      pointer-events: none;
    }

    .badge-item .badge-tooltip strong {
      display: block;
      color: #e94560;
      margin-bottom: 2px;
    }

    .badge-item:hover .badge-tooltip { display: block; }

    /* Win record highlights */
    .win-record {
      color: #ffd700;
      font-weight: 600;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>City Puzzle</h1>
  <p class="subtitle" id="date-label">Loading today's city...</p>

  <div class="game-area">
    <div class="sidebar">
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Moves</span>
          <span class="stat-value" id="move-count">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="timer">0:00</span>
        </div>
      </div>

      <div class="preview-box">
        <span class="preview-label">Target</span>
        <img id="preview" class="preview-img" alt="Preview" />
      </div>

      <div class="pb-panel">
        <div class="pb-title">Personal Bests</div>
        <div class="pb-row">
          <span class="pb-icon">⏱</span>
          <span class="pb-label">Best Time</span>
          <span class="pb-value" id="pb-time-display">--</span>
        </div>
        <div class="pb-row">
          <span class="pb-icon">🎯</span>
          <span class="pb-label">Best Moves</span>
          <span class="pb-value" id="pb-moves-display">--</span>
        </div>
      </div>

      <div class="badge-shelf">
        <div class="badge-shelf-title">Badges</div>
        <div class="badge-tray" id="badge-tray"></div>
      </div>

      <button class="btn" id="new-game-btn">New Game</button>
    </div>

    <div class="board-wrapper">
      <div id="board"></div>
      <div id="win-overlay">
        <div class="win-emoji">🎉</div>
        <div class="win-title">Puzzle Solved!</div>
        <div class="win-stats" id="win-stats"></div>
        <div id="win-records"></div>
        <button class="btn" onclick="newGame()" style="width:160px;margin-top:8px">Play Again</button>
      </div>
    </div>
  </div>

  <p class="loading-msg" id="loading-msg">Loading image...</p>

  <script>
    const GRID = 3;
    const TILE_SIZE = 100;
    const TOTAL = GRID * GRID;

    let IMAGE_URL = '';

    document.getElementById('date-label').textContent =
      `Daily puzzle — ${new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' })}`;

    // ── Cookie helpers ────────────────────────────────────────────────────
    function setCookie(name, value, days) {
      const expires = new Date(Date.now() + days * 864e5).toUTCString();
      document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
    }

    function getCookie(name) {
      const match = document.cookie.split('; ').find(row => row.startsWith(name + '='));
      return match ? decodeURIComponent(match.split('=')[1]) : null;
    }

    // ── Badges ────────────────────────────────────────────────────────────
    const BADGES = [
      { id: 'speed_demon',  label: 'Speed Demon',   desc: 'Complete in under 60 seconds', icon: '⚡', earned: false },
      { id: 'efficient',    label: 'Efficient',      desc: 'Complete in under 30 moves',   icon: '🎯', earned: false },
      { id: 'first_solve',  label: 'First Solve',    desc: 'Complete your first puzzle',   icon: '🏆', earned: false },
      { id: 'daily_player', label: 'Daily Player',   desc: 'Play 7 days in a row',         icon: '📅', earned: false },
    ];

    function loadEarnedBadges() {
      const raw = getCookie('earned_badges');
      if (!raw) return;
      const ids = raw.split(',').map(s => s.trim()).filter(Boolean);
      BADGES.forEach(b => { if (ids.includes(b.id)) b.earned = true; });
    }

    function saveEarnedBadges() {
      const ids = BADGES.filter(b => b.earned).map(b => b.id).join(',');
      setCookie('earned_badges', ids, 365);
    }

    function renderBadges() {
      const tray = document.getElementById('badge-tray');
      tray.innerHTML = '';
      BADGES.forEach(badge => {
        const el = document.createElement('div');
        el.className = 'badge-item' + (badge.earned ? ' earned' : '');
        el.innerHTML = `${badge.icon}<div class="badge-tooltip"><strong>${badge.label}</strong>${badge.desc}</div>`;
        tray.appendChild(el);
      });
    }

    function awardBadge(id) {
      const badge = BADGES.find(b => b.id === id);
      if (badge && !badge.earned) {
        badge.earned = true;
        saveEarnedBadges();
        renderBadges();
        return true;
      }
      return false;
    }

    // ── Personal Bests ────────────────────────────────────────────────────
    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = String(secs % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function loadPBDisplay() {
      const pbTime = getCookie('pb_time');
      const pbMoves = getCookie('pb_moves');
      document.getElementById('pb-time-display').textContent =
        pbTime ? formatTime(parseInt(pbTime, 10)) : '--';
      document.getElementById('pb-moves-display').textContent =
        pbMoves ? pbMoves : '--';
    }

    // Returns array of record strings e.g. ['🎉 New best time!', '🎯 New best moves!']
    function checkAndSavePBs(elapsedSecs, moveCount) {
      const records = [];
      const pbTime = getCookie('pb_time');
      const pbMoves = getCookie('pb_moves');

      if (pbTime === null || elapsedSecs < parseInt(pbTime, 10)) {
        setCookie('pb_time', elapsedSecs, 365);
        document.getElementById('pb-time-display').textContent = formatTime(elapsedSecs);
        if (pbTime !== null) records.push('🎉 New best time!');
      }

      if (pbMoves === null || moveCount < parseInt(pbMoves, 10)) {
        setCookie('pb_moves', moveCount, 365);
        document.getElementById('pb-moves-display').textContent = moveCount;
        if (pbMoves !== null) records.push('🎯 New best moves!');
      }

      return records;
    }

    // ── Puzzle state ──────────────────────────────────────────────────────
    let tiles = [];
    let emptyIdx = 0;
    let moves = 0;
    let startTime = null;
    let timerInterval = null;
    let solved = false;
    let imageLoaded = false;

    // ── Solvability ───────────────────────────────────────────────────────
    function countInversions(arr) {
      let inv = 0;
      for (let i = 0; i < arr.length - 1; i++)
        for (let j = i + 1; j < arr.length; j++)
          if (arr[i] && arr[j] && arr[i] > arr[j]) inv++;
      return inv;
    }

    function isSolvable(arr) {
      const inv = countInversions(arr);
      const emptyRow = Math.floor(arr.indexOf(0) / GRID);
      const emptyRowFromBottom = GRID - emptyRow;
      return (inv % 2 === 0) === (emptyRowFromBottom % 2 === 1);
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function generateSolvable() {
      const arr = Array.from({ length: TOTAL }, (_, i) => i);
      do { shuffle(arr); } while (!isSolvable(arr) || isSolved(arr));
      return arr;
    }

    function isSolved(arr) {
      return arr.every((v, i) => v === i);
    }

    // ── Rendering ─────────────────────────────────────────────────────────
    function render() {
      const board = document.getElementById('board');
      board.innerHTML = '';

      tiles.forEach((val, idx) => {
        const tile = document.createElement('div');
        tile.className = 'tile' + (val === 0 ? ' empty' : '');
        tile.dataset.idx = idx;

        if (val !== 0 && imageLoaded) {
          const srcPos = val;
          const col = srcPos % GRID;
          const row = Math.floor(srcPos / GRID);
          tile.style.backgroundImage = `url('${IMAGE_URL}')`;
          tile.style.backgroundSize = `${GRID * TILE_SIZE}px ${GRID * TILE_SIZE}px`;
          tile.style.backgroundPosition = `-${col * TILE_SIZE}px -${row * TILE_SIZE}px`;
        } else if (val !== 0) {
          tile.style.background = `hsl(${val * 23}, 50%, 30%)`;
        }

        tile.addEventListener('click', () => handleClick(idx));
        board.appendChild(tile);
      });
    }

    // ── Move logic ────────────────────────────────────────────────────────
    function getMovable() {
      const row = Math.floor(emptyIdx / GRID);
      const col = emptyIdx % GRID;
      const neighbors = [];
      if (row > 0) neighbors.push(emptyIdx - GRID);
      if (row < GRID - 1) neighbors.push(emptyIdx + GRID);
      if (col > 0) neighbors.push(emptyIdx - 1);
      if (col < GRID - 1) neighbors.push(emptyIdx + 1);
      return neighbors;
    }

    function handleClick(idx) {
      if (solved) return;
      const movable = getMovable();
      if (!movable.includes(idx)) return;

      [tiles[emptyIdx], tiles[idx]] = [tiles[idx], tiles[emptyIdx]];
      emptyIdx = idx;
      moves++;
      document.getElementById('move-count').textContent = moves;

      if (startTime === null) startTimer();

      render();

      if (isSolved(tiles)) winGame();
    }

    // ── Timer ─────────────────────────────────────────────────────────────
    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(updateTimer, 500);
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(elapsed / 60);
      const s = String(elapsed % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function elapsedSecs() {
      if (!startTime) return 0;
      return Math.floor((Date.now() - startTime) / 1000);
    }

    function elapsedStr() {
      return formatTime(elapsedSecs());
    }

    // ── Win ───────────────────────────────────────────────────────────────
    function winGame() {
      solved = true;
      stopTimer();

      const secs = elapsedSecs();
      const records = checkAndSavePBs(secs, moves);

      // Award badges
      const newBadges = [];
      if (awardBadge('first_solve')) newBadges.push('🏆 First Solve!');
      if (secs < 60 && awardBadge('speed_demon')) newBadges.push('⚡ Speed Demon!');
      if (moves < 30 && awardBadge('efficient')) newBadges.push('🎯 Efficient!');

      document.getElementById('win-stats').textContent =
        `${moves} moves · ${elapsedStr()}`;

      const allHighlights = [...records, ...newBadges];
      const recordsEl = document.getElementById('win-records');
      recordsEl.innerHTML = allHighlights
        .map(msg => `<div class="win-record">${msg}</div>`)
        .join('');

      document.getElementById('win-overlay').classList.add('show');
    }

    // ── New game ──────────────────────────────────────────────────────────
    function newGame() {
      stopTimer();
      tiles = generateSolvable();
      emptyIdx = tiles.indexOf(0);
      moves = 0;
      startTime = null;
      solved = false;
      document.getElementById('move-count').textContent = '0';
      document.getElementById('timer').textContent = '0:00';
      document.getElementById('win-overlay').classList.remove('show');
      document.getElementById('win-records').innerHTML = '';
      render();
    }

    // ── Boot ──────────────────────────────────────────────────────────────
    function loadImage(url) {
      IMAGE_URL = url;
      document.getElementById('preview').src = IMAGE_URL;
      const img = new Image();
      img.onload = () => {
        imageLoaded = true;
        document.getElementById('loading-msg').textContent = '';
        render();
      };
      img.onerror = () => {
        document.getElementById('loading-msg').textContent =
          'Image failed to load — tiles shown as colors.';
        imageLoaded = false;
        render();
      };
      img.src = IMAGE_URL;
    }

    document.getElementById('new-game-btn').addEventListener('click', newGame);

    loadEarnedBadges();
    renderBadges();
    loadPBDisplay();
    newGame();

    fetch('/api/config')
      .then(r => r.json())
      .then(cfg => loadImage(cfg.imageUrl))
      .catch(() => {
        document.getElementById('loading-msg').textContent =
          'Could not load config — tiles shown as colors.';
      });
  </script>
</body>
</html>
