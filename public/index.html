<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Puzzle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 16px;
    }

    /* Difficulty selector */
    .difficulty-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .diff-btn {
      padding: 8px 24px;
      border-radius: 20px;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .diff-btn.active {
      background: #e94560;
      color: #fff;
    }

    .diff-btn:hover:not(.active) {
      background: rgba(233,69,96,0.15);
    }

    .game-area {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 160px;
    }

    .stats {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e94560;
    }

    .preview-box {
      background: #16213e;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .preview-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }

    .preview-img {
      width: 140px;
      height: 140px;
      border-radius: 8px;
      object-fit: cover;
      display: block;
    }

    .btn {
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    /* Puzzle board */
    .board-wrapper {
      position: relative;
    }

    #board {
      display: grid;
      gap: 3px;
      background: #0f3460;
      border-radius: 12px;
      padding: 3px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .tile {
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.12s ease;
      position: relative;
      overflow: hidden;
    }

    .tile:hover:not(.empty) {
      transform: scale(1.03);
      z-index: 1;
    }

    .tile.empty {
      background: #0a1628 !important;
      cursor: default;
      box-shadow: inset 0 0 12px rgba(0,0,0,0.8);
    }

    /* Win overlay */
    #win-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(10, 22, 40, 0.92);
      border-radius: 12px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 20px;
    }

    #win-overlay.show { display: flex; }

    .win-emoji { font-size: 3rem; }

    .win-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e94560;
    }

    .win-stats {
      font-size: 0.9rem;
      color: #aaa;
    }

    .loading-msg {
      color: #888;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>City Puzzle</h1>
  <p class="subtitle" id="date-label">Loading today's city...</p>

  <div class="difficulty-bar">
    <button class="diff-btn active" id="btn-easy" onclick="setDifficulty('easy')">Easy</button>
    <button class="diff-btn" id="btn-hard" onclick="setDifficulty('hard')">Hard</button>
  </div>

  <div class="game-area">
    <div class="sidebar">
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Moves</span>
          <span class="stat-value" id="move-count">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="timer">0:00</span>
        </div>
      </div>

      <div class="preview-box">
        <span class="preview-label">Target</span>
        <img id="preview" class="preview-img" alt="Preview" />
      </div>

      <button class="btn" id="new-game-btn">New Game</button>
    </div>

    <div class="board-wrapper">
      <div id="board"></div>
      <div id="win-overlay">
        <div class="win-emoji">🎉</div>
        <div class="win-title">Puzzle Solved!</div>
        <div class="win-stats" id="win-stats"></div>
        <button class="btn" onclick="newGame()" style="width:160px;margin-top:8px">Play Again</button>
      </div>
    </div>
  </div>

  <p class="loading-msg" id="loading-msg">Loading image...</p>

  <script>
    // ── Config per difficulty ─────────────────────────────────────────────
    const DIFFICULTY_CONFIG = {
      easy: { grid: 3, tileSize: 130 },
      hard: { grid: 4, tileSize: 100 }
    };

    let difficulty = 'easy';
    let GRID = 3;
    let TILE_SIZE = 130;
    let TOTAL = 9;

    // ── Date-based image URL ──────────────────────────────────────────────
    function todayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}${m}${day}`;
    }

    const DATE_SEED = todayStr();
    const IMAGE_URL = `https://loremflickr.com/800/800/city,skyline?lock=${DATE_SEED}`;

    document.getElementById('date-label').textContent =
      `Daily puzzle — ${new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' })}`;
    document.getElementById('preview').src = IMAGE_URL;

    // ── Puzzle state ──────────────────────────────────────────────────────
    let tiles = [];
    let emptyIdx = 0;
    let moves = 0;
    let startTime = null;
    let timerInterval = null;
    let solved = false;
    let imageLoaded = false;

    // ── Difficulty selector ───────────────────────────────────────────────
    function setDifficulty(d) {
      if (d === difficulty) return;
      difficulty = d;
      const cfg = DIFFICULTY_CONFIG[difficulty];
      GRID = cfg.grid;
      TILE_SIZE = cfg.tileSize;
      TOTAL = GRID * GRID;

      document.getElementById('btn-easy').classList.toggle('active', d === 'easy');
      document.getElementById('btn-hard').classList.toggle('active', d === 'hard');

      newGame();
    }

    // ── Solvability ───────────────────────────────────────────────────────
    function countInversions(arr) {
      let inv = 0;
      for (let i = 0; i < arr.length - 1; i++)
        for (let j = i + 1; j < arr.length; j++)
          if (arr[i] && arr[j] && arr[i] > arr[j]) inv++;
      return inv;
    }

    function isSolvable(arr) {
      const inv = countInversions(arr);
      if (GRID % 2 === 1) {
        // Odd grid (3x3): solvable iff inversions count is even
        return inv % 2 === 0;
      } else {
        // Even grid (4x4): solvable iff
        // (inversions even AND empty on odd row from bottom) OR
        // (inversions odd AND empty on even row from bottom)
        const emptyRow = Math.floor(arr.indexOf(0) / GRID);
        const emptyRowFromBottom = GRID - emptyRow;
        return (inv % 2 === 0) === (emptyRowFromBottom % 2 === 1);
      }
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function generateSolvable() {
      const arr = Array.from({ length: TOTAL }, (_, i) => i);
      do { shuffle(arr); } while (!isSolvable(arr) || isSolved(arr));
      return arr;
    }

    function isSolved(arr) {
      return arr.every((v, i) => v === i);
    }

    // ── Rendering ─────────────────────────────────────────────────────────
    function applyBoardLayout() {
      const board = document.getElementById('board');
      board.style.gridTemplateColumns = `repeat(${GRID}, ${TILE_SIZE}px)`;
      board.style.gridTemplateRows = `repeat(${GRID}, ${TILE_SIZE}px)`;
    }

    function render() {
      const board = document.getElementById('board');
      applyBoardLayout();
      board.innerHTML = '';

      tiles.forEach((val, idx) => {
        const tile = document.createElement('div');
        tile.className = 'tile' + (val === 0 ? ' empty' : '');
        tile.dataset.idx = idx;
        tile.style.width = `${TILE_SIZE}px`;
        tile.style.height = `${TILE_SIZE}px`;

        if (val !== 0 && imageLoaded) {
          const col = val % GRID;
          const row = Math.floor(val / GRID);
          tile.style.backgroundImage = `url('${IMAGE_URL}')`;
          tile.style.backgroundSize = `${GRID * TILE_SIZE}px ${GRID * TILE_SIZE}px`;
          tile.style.backgroundPosition = `-${col * TILE_SIZE}px -${row * TILE_SIZE}px`;
        } else if (val !== 0) {
          tile.style.background = `hsl(${val * 23}, 50%, 30%)`;
        }

        tile.addEventListener('click', () => handleClick(idx));
        board.appendChild(tile);
      });
    }

    // ── Move logic ────────────────────────────────────────────────────────
    function getMovable() {
      const row = Math.floor(emptyIdx / GRID);
      const col = emptyIdx % GRID;
      const neighbors = [];
      if (row > 0) neighbors.push(emptyIdx - GRID);
      if (row < GRID - 1) neighbors.push(emptyIdx + GRID);
      if (col > 0) neighbors.push(emptyIdx - 1);
      if (col < GRID - 1) neighbors.push(emptyIdx + 1);
      return neighbors;
    }

    function handleClick(idx) {
      if (solved) return;
      const movable = getMovable();
      if (!movable.includes(idx)) return;

      [tiles[emptyIdx], tiles[idx]] = [tiles[idx], tiles[emptyIdx]];
      emptyIdx = idx;
      moves++;
      document.getElementById('move-count').textContent = moves;

      if (startTime === null) startTimer();

      render();

      if (isSolved(tiles)) winGame();
    }

    // ── Timer ─────────────────────────────────────────────────────────────
    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(updateTimer, 500);
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(elapsed / 60);
      const s = String(elapsed % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function elapsedStr() {
      if (!startTime) return '0:00';
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(elapsed / 60);
      const s = String(elapsed % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    // ── Win ───────────────────────────────────────────────────────────────
    function winGame() {
      solved = true;
      stopTimer();
      document.getElementById('win-stats').textContent =
        `${moves} moves · ${elapsedStr()}`;
      document.getElementById('win-overlay').classList.add('show');
    }

    // ── New game ──────────────────────────────────────────────────────────
    function newGame() {
      stopTimer();
      const cfg = DIFFICULTY_CONFIG[difficulty];
      GRID = cfg.grid;
      TILE_SIZE = cfg.tileSize;
      TOTAL = GRID * GRID;

      tiles = generateSolvable();
      emptyIdx = tiles.indexOf(0);
      moves = 0;
      startTime = null;
      solved = false;
      document.getElementById('move-count').textContent = '0';
      document.getElementById('timer').textContent = '0:00';
      document.getElementById('win-overlay').classList.remove('show');
      render();
    }

    // ── Boot ──────────────────────────────────────────────────────────────
    const img = new Image();
    img.onload = () => {
      imageLoaded = true;
      document.getElementById('loading-msg').textContent = '';
      render();
    };
    img.onerror = () => {
      document.getElementById('loading-msg').textContent =
        'Image failed to load — tiles shown as colors.';
      imageLoaded = false;
      render();
    };
    img.src = IMAGE_URL;

    document.getElementById('new-game-btn').addEventListener('click', newGame);

    newGame();
  </script>
</body>
</html>
